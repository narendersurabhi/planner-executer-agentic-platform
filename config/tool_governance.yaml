        - file_write_artifact
        - list_files
        - search_text
        - artifact_move
        - artifact_mkdir
        - workspace_mkdir
        - artifact_delete
        - workspace_delete
        - artifact_rename
        - workspace_rename
        - artifact_copy
        - workspace_copy
        - workspace_read_text
        - workspace_list_files
        - coding_agent_generate
        - coding_agent_autonomous
        - coding_agent_publish_pr
      deny:
