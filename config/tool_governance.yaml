        - run_tests
        - sleep
        - http_fetch
        - workspace_write_text
        - workspace_write_code
        - file_write_code
        - coding_agent_generate
        - coding_agent_autonomous
        - github_repo_create
        - github_repo_update
        - github_repo_list
        - github_branch_list
        - github_file_write
        - github_pr_create
        - github_repo_push
        - github_repo_clone_or_pull
        - github_repo_push_pr
