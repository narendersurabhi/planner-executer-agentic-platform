tool_governance:
  mode: enforce
  global:
    allow: []
    deny: []
  services:
    planner:
      allow:
        - json_transform
        - llm_generate
        - llm_generate_document_spec
        - llm_generate_document_spec_from_markdown
        - llm_improve_document_spec
