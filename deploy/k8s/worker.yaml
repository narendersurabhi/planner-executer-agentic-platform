apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: awe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/awe-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: awe-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: awe-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: awe-secrets
                  key: GITHUB_TOKEN
                  optional: true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: awe-secrets
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: awe-secrets
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: awe-secrets
                  key: AWS_SESSION_TOKEN
                  optional: true
            - name: WORKER_METRICS_PORT
              value: "9102"
          ports:
            - containerPort: 9102
              name: metrics
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: capability-registry-config
              mountPath: /app/config/capability_registry.yaml
              subPath: capability_registry.yaml
              readOnly: true
            - name: mcp-servers-config
              mountPath: /app/config/mcp_servers.yaml
              subPath: mcp_servers.yaml
              readOnly: true
            - name: shared-data
              mountPath: /shared
      volumes:
        - name: capability-registry-config
          configMap:
            name: capability-registry
        - name: mcp-servers-config
          configMap:
            name: mcp-servers-config
        - name: shared-data
          persistentVolumeClaim:
            claimName: shared-data
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: awe
spec:
  selector:
    app: worker
  ports:
    - name: metrics
      port: 9102
      targetPort: 9102
