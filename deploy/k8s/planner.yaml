apiVersion: apps/v1
kind: Deployment
metadata:
  name: planner
  namespace: awe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: planner
  template:
    metadata:
      labels:
        app: planner
    spec:
      containers:
        - name: planner
          image: ghcr.io/your-org/awe-planner:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: awe-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: awe-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: PLANNER_METRICS_PORT
              value: "9101"
          ports:
            - containerPort: 9101
              name: metrics
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: capability-registry-config
              mountPath: /app/config/capability_registry.yaml
              subPath: capability_registry.yaml
              readOnly: true
      volumes:
        - name: capability-registry-config
          configMap:
            name: capability-registry
---
apiVersion: v1
kind: Service
metadata:
  name: planner
  namespace: awe
spec:
  selector:
    app: planner
  ports:
    - name: metrics
      port: 9101
      targetPort: 9101
