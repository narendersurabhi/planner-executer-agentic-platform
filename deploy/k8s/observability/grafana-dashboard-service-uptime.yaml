apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-service-uptime
  namespace: awe
data:
  service-uptime.json: |
    {
      "uid": "service-uptime",
      "title": "Service Uptime",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Service Up Status",
          "datasource": "Prometheus",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "max by (job) (up{job=~\"awe-api|awe-planner|awe-worker|awe-policy|awe-coder|awe-prometheus|awe-loki|awe-grafana\"})"
            }
          ],
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": ["lastNotNull"],
              "fields": ""
            },
            "orientation": "horizontal",
            "textMode": "name",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": { "text": "DOWN", "color": "red" },
                    "1": { "text": "UP", "color": "green" }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": 0 },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Service Availability Over Time",
          "datasource": "Prometheus",
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 10 },
          "targets": [
            {
              "refId": "A",
              "expr": "max by (job) (up{job=~\"awe-api|awe-planner|awe-worker|awe-policy|awe-coder|awe-prometheus|awe-loki|awe-grafana\"})",
              "legendFormat": "{{job}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 1
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Average Uptime Ratio (1h)",
          "datasource": "Prometheus",
          "gridPos": { "x": 0, "y": 18, "w": 24, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "avg by (job) (avg_over_time(up{job=~\"awe-api|awe-planner|awe-worker|awe-policy|awe-coder|awe-prometheus|awe-loki|awe-grafana\"}[1h]))"
            }
          ],
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": ["lastNotNull"],
              "fields": ""
            },
            "orientation": "horizontal",
            "textMode": "name",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": 0 },
                  { "color": "yellow", "value": 0.95 },
                  { "color": "green", "value": 0.999 }
                ]
              }
            },
            "overrides": []
          }
        }
      ]
    }
