apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-task-metrics
  namespace: awe
data:
  task-metrics.json: |
    {
      "uid": "task-metrics",
      "title": "Task Metrics",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Task Executions by Status (rate)",
          "datasource": "Prometheus",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (status) (rate(capability_execution_outcomes_total[5m]))",
              "legendFormat": "{{status}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Task Executions by Capability (rate)",
          "datasource": "Prometheus",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(12, sum by (capability) (rate(capability_execution_outcomes_total[5m])))",
              "legendFormat": "{{capability}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Planner Selections by Capability (rate)",
          "datasource": "Prometheus",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(12, sum by (capability) (rate(planner_capability_selection_total[5m])))",
              "legendFormat": "{{capability}}"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Task Success Ratio",
          "datasource": "Prometheus",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(capability_execution_outcomes_total{status=\"completed\"}[5m])) / clamp_min(sum(rate(capability_execution_outcomes_total[5m])), 0.0001)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Selected vs Executed (rate)",
          "datasource": "Prometheus",
          "gridPos": { "x": 0, "y": 16, "w": 24, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(planner_capability_selection_total[5m]))",
              "legendFormat": "selected"
            },
            {
              "refId": "B",
              "expr": "sum(rate(capability_execution_outcomes_total[5m]))",
              "legendFormat": "executed"
            }
          ]
        }
      ]
    }
