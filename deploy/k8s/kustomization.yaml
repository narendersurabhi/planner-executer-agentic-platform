apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: awe
resources:
  - namespace.yaml
  - configmap.yaml
  - pvc-postgres.yaml
  - pvc-redis.yaml
  - pvc-shared.yaml
  - postgres.yaml
  - redis.yaml
  - jaeger.yaml
  - github-mcp.yaml
  - coder.yaml
  - planner.yaml
  - policy.yaml
  - worker.yaml
  - api.yaml
  - ui.yaml
  - hpa-api.yaml
  - hpa-coder.yaml
configMapGenerator:
  - name: capability-registry
    files:
      - capability_registry.yaml=../../config/capability_registry.yaml
  - name: mcp-servers-config
    files:
      - mcp_servers.yaml=../../config/mcp_servers.yaml
generatorOptions:
  disableNameSuffixHash: true
images:
  - name: ghcr.io/your-org/awe-api
    newName: localhost:5001/awe-api
    newTag: latest
  - name: ghcr.io/your-org/awe-planner
    newName: localhost:5001/awe-planner
    newTag: latest
  - name: ghcr.io/your-org/awe-worker
    newName: localhost:5001/awe-worker
    newTag: latest
  - name: ghcr.io/your-org/awe-coder
    newName: localhost:5001/awe-coder
    newTag: latest
  - name: ghcr.io/your-org/awe-ui
    newName: localhost:5001/awe-ui
    newTag: latest
  - name: ghcr.io/your-org/awe-policy
    newName: localhost:5001/awe-policy
    newTag: latest
