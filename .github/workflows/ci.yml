name: ci
on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentic
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Install deps
        run: |
          pip install ruff mypy pytest httpx
          pip install -e libs/core
          pip install -e services/api
          pip install -e services/worker
      - name: Lint
        run: ruff check libs services
      - name: Format
        run: ruff format --check libs services
      - name: Type check
        run: mypy --config-file mypy.ini
      - name: Tests
        run: PYTHONPATH=. pytest
      - name: Intent Eval Gate
        run: make eval-intent-gate
      - name: Chat Boundary Eval Gate
        run: make eval-chat-boundary-gate
      - name: Chat Clarification Eval Gate
        run: make eval-chat-clarification-gate
      - name: DeepEval Agent Gate
        run: make eval-deepeval-gate
        continue-on-error: true
      - name: Upload DeepEval Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepeval-agent-reports
          if-no-files-found: ignore
          path: |
            artifacts/evals/deepeval_chat_report.json
            artifacts/evals/deepeval_planner_report.json
            artifacts/evals/deepeval_gate_report.json
      - name: Docker build
        run: docker compose build
