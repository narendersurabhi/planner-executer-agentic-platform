name: staging-routing-gate

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Optional staging API base URL override"
        required: false
        type: string
      gold_path:
        description: "Live regression suite path"
        required: false
        default: "eval/chat_boundary_live_regression.yaml"
        type: string
      min_pass_rate:
        description: "Minimum pass rate required"
        required: false
        default: "1.0"
        type: string
      build_calibrator:
        description: "Build chat-routing calibrator artifacts from staging feedback"
        required: false
        default: true
        type: boolean
      feedback_limit:
        description: "Maximum feedback examples to export for calibrator training"
        required: false
        default: "5000"
        type: string
      calibrator_min_examples:
        description: "Minimum reranker examples required before writing a calibrator model"
        required: false
        default: "10"
        type: string
      verbose:
        description: "Print per-case rows"
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      base_url:
        required: false
        default: ""
        type: string
      gold_path:
        required: false
        default: "eval/chat_boundary_live_regression.yaml"
        type: string
      min_pass_rate:
        required: false
        default: "1.0"
        type: string
      build_calibrator:
        required: false
        default: true
        type: boolean
      feedback_limit:
        required: false
        default: "5000"
        type: string
      calibrator_min_examples:
        required: false
        default: "10"
        type: string
      verbose:
        required: false
        default: false
        type: boolean
    secrets:
      STAGING_API_BASE_URL:
        required: false
      STAGING_API_BEARER_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  live-chat-routing-regression:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Resolve staging target
        env:
          INPUT_BASE_URL: ${{ inputs.base_url }}
          INPUT_GOLD_PATH: ${{ inputs.gold_path }}
          INPUT_MIN_PASS_RATE: ${{ inputs.min_pass_rate }}
          INPUT_BUILD_CALIBRATOR: ${{ inputs.build_calibrator }}
          INPUT_FEEDBACK_LIMIT: ${{ inputs.feedback_limit }}
          INPUT_CALIBRATOR_MIN_EXAMPLES: ${{ inputs.calibrator_min_examples }}
          INPUT_VERBOSE: ${{ inputs.verbose }}
          SECRET_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
          SECRET_BEARER_TOKEN: ${{ secrets.STAGING_API_BEARER_TOKEN }}
        run: |
          BASE_URL="${INPUT_BASE_URL:-}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="${SECRET_BASE_URL:-}"
          fi
          if [ -z "$BASE_URL" ]; then
            echo "::error::Missing staging API base URL. Provide workflow input 'base_url' or environment secret 'STAGING_API_BASE_URL'."
            exit 1
          fi
          echo "CHAT_BOUNDARY_LIVE_BASE_URL=$BASE_URL" >> "$GITHUB_ENV"
          echo "CHAT_ROUTING_FEEDBACK_BASE_URL=$BASE_URL" >> "$GITHUB_ENV"
          echo "CHAT_BOUNDARY_LIVE_GOLD=${INPUT_GOLD_PATH:-eval/chat_boundary_live_regression.yaml}" >> "$GITHUB_ENV"
          echo "CHAT_BOUNDARY_LIVE_MIN_PASS_RATE=${INPUT_MIN_PASS_RATE:-1.0}" >> "$GITHUB_ENV"
          echo "CHAT_BOUNDARY_LIVE_OUTPUT=artifacts/evals/chat_boundary_live_report.json" >> "$GITHUB_ENV"
          echo "CHAT_ROUTING_FEEDBACK_LIMIT=${INPUT_FEEDBACK_LIMIT:-5000}" >> "$GITHUB_ENV"
          echo "CHAT_ROUTING_CALIBRATOR_MIN_EXAMPLES=${INPUT_CALIBRATOR_MIN_EXAMPLES:-10}" >> "$GITHUB_ENV"
          echo "CHAT_ROUTING_CALIBRATOR_REPORT_OUTPUT=artifacts/evals/chat_routing_calibrator_report.json" >> "$GITHUB_ENV"
          echo "BUILD_CHAT_ROUTING_CALIBRATOR=${INPUT_BUILD_CALIBRATOR}" >> "$GITHUB_ENV"
          if [ "${INPUT_VERBOSE}" = "true" ]; then
            echo "CHAT_BOUNDARY_LIVE_VERBOSE=1" >> "$GITHUB_ENV"
          else
            echo "CHAT_BOUNDARY_LIVE_VERBOSE=0" >> "$GITHUB_ENV"
          fi
          if [ -n "${SECRET_BEARER_TOKEN:-}" ]; then
            echo "CHAT_BOUNDARY_LIVE_BEARER_TOKEN=$SECRET_BEARER_TOKEN" >> "$GITHUB_ENV"
            echo "CHAT_ROUTING_FEEDBACK_BEARER_TOKEN=$SECRET_BEARER_TOKEN" >> "$GITHUB_ENV"
          fi

      - name: Build chat routing calibrator artifacts from staging feedback
        if: env.BUILD_CHAT_ROUTING_CALIBRATOR == 'true'
        run: make build-chat-routing-calibrator-from-api

      - name: Evaluate chat routing calibrator replay report
        if: env.BUILD_CHAT_ROUTING_CALIBRATOR == 'true'
        run: |
          if [ -f artifacts/evals/chat_routing_calibrator.json ]; then
            make eval-chat-routing-calibrator
          else
            echo "Skipping replay eval because chat_routing_calibrator.json was not written."
          fi

      - name: Run staging chat routing regression
        run: make eval-chat-boundary-live

      - name: Run DeepEval staging replay
        run: make eval-deepeval-staging-replay
        continue-on-error: true

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-boundary-live-report
          path: artifacts/evals/chat_boundary_live_report.json

      - name: Upload calibrator artifacts
        if: always() && env.BUILD_CHAT_ROUTING_CALIBRATOR == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: chat-routing-calibrator-artifacts
          if-no-files-found: ignore
          path: |
            artifacts/evals/chat_routing_feedback.jsonl
            training/chat_routing_reranker_train.jsonl
            artifacts/evals/chat_routing_calibrator.json
            artifacts/evals/chat_routing_calibrator_report.json
            artifacts/evals/chat_routing_calibrator_replay_report.json

      - name: Upload DeepEval staging replay report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepeval-staging-replay-report
          if-no-files-found: ignore
          path: artifacts/evals/deepeval_staging_replay_report.json
