name: release-staging

on:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing immutable image tag to deploy. Leave empty to build from the current revision."
        required: false
        type: string
      gold_path:
        description: "Live regression suite path"
        required: false
        default: "eval/chat_boundary_live_regression.yaml"
        type: string
      min_pass_rate:
        description: "Minimum pass rate required"
        required: false
        default: "1.0"
        type: string
      build_calibrator:
        description: "Build chat-routing calibrator artifacts from staging feedback"
        required: false
        default: true
        type: boolean
      verbose:
        description: "Print per-case rows in the staging regression workflow"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: release-staging
  cancel-in-progress: false

jobs:
  prepare:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    outputs:
      source_sha: ${{ steps.resolve.outputs.source_sha }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      should_build: ${{ steps.resolve.outputs.should_build }}
      image_owner: ${{ steps.resolve.outputs.image_owner }}
      gold_path: ${{ steps.resolve.outputs.gold_path }}
      min_pass_rate: ${{ steps.resolve.outputs.min_pass_rate }}
      build_calibrator: ${{ steps.resolve.outputs.build_calibrator }}
      verbose: ${{ steps.resolve.outputs.verbose }}
    steps:
      - name: Resolve release inputs
        id: resolve
        env:
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          INPUT_GOLD_PATH: ${{ github.event.inputs.gold_path }}
          INPUT_MIN_PASS_RATE: ${{ github.event.inputs.min_pass_rate }}
          INPUT_BUILD_CALIBRATOR: ${{ github.event.inputs.build_calibrator }}
          INPUT_VERBOSE: ${{ github.event.inputs.verbose }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            SOURCE_SHA="${{ github.event.workflow_run.head_sha }}"
            GOLD_PATH="eval/chat_boundary_live_regression.yaml"
            MIN_PASS_RATE="1.0"
            BUILD_CALIBRATOR="true"
            VERBOSE="false"
          else
            SOURCE_SHA="${GITHUB_SHA}"
            GOLD_PATH="${INPUT_GOLD_PATH:-eval/chat_boundary_live_regression.yaml}"
            MIN_PASS_RATE="${INPUT_MIN_PASS_RATE:-1.0}"
            BUILD_CALIBRATOR="${INPUT_BUILD_CALIBRATOR:-true}"
            VERBOSE="${INPUT_VERBOSE:-false}"
          fi

          IMAGE_OWNER="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${INPUT_IMAGE_TAG:-}" ]; then
            IMAGE_TAG="${INPUT_IMAGE_TAG}"
            SHOULD_BUILD="false"
          else
            IMAGE_TAG="sha-${SOURCE_SHA:0:12}"
            SHOULD_BUILD="true"
          fi

          {
            echo "source_sha=${SOURCE_SHA}"
            echo "image_tag=${IMAGE_TAG}"
            echo "should_build=${SHOULD_BUILD}"
            echo "image_owner=${IMAGE_OWNER}"
            echo "gold_path=${GOLD_PATH}"
            echo "min_pass_rate=${MIN_PASS_RATE}"
            echo "build_calibrator=${BUILD_CALIBRATOR}"
            echo "verbose=${VERBOSE}"
          } >> "${GITHUB_OUTPUT}"

  publish-images:
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        run: |
          IMAGE_REGISTRY=ghcr.io \
          IMAGE_OWNER=${{ needs.prepare.outputs.image_owner }} \
          IMAGE_TAG=${{ needs.prepare.outputs.image_tag }} \
          NEXT_PUBLIC_API_URL=/api \
          NEXT_PUBLIC_DEV_TOOLS=false \
          make images-build

      - name: Push images
        run: |
          IMAGE_REGISTRY=ghcr.io \
          IMAGE_OWNER=${{ needs.prepare.outputs.image_owner }} \
          IMAGE_TAG=${{ needs.prepare.outputs.image_tag }} \
          make images-push

      - name: Write image manifest
        run: |
          mkdir -p artifacts/release
          IMAGE_REGISTRY=ghcr.io \
          IMAGE_OWNER=${{ needs.prepare.outputs.image_owner }} \
          IMAGE_TAG=${{ needs.prepare.outputs.image_tag }} \
          make images-list > artifacts/release/staging-images.txt

      - name: Upload image manifest
        uses: actions/upload-artifact@v4
        with:
          name: staging-images-${{ needs.prepare.outputs.image_tag }}
          path: artifacts/release/staging-images.txt

  deploy-staging:
    needs: [prepare, publish-images]
    if: needs.prepare.result == 'success' && (needs.publish-images.result == 'success' || needs.publish-images.result == 'skipped')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          STAGING_KUBECONFIG_B64: ${{ secrets.STAGING_KUBECONFIG_B64 }}
        run: |
          if [ -z "${STAGING_KUBECONFIG_B64:-}" ]; then
            echo "::error::Missing STAGING_KUBECONFIG_B64 secret."
            exit 1
          fi
          printf '%s' "${STAGING_KUBECONFIG_B64}" | base64 --decode > "${RUNNER_TEMP}/kubeconfig"
          echo "KUBECONFIG=${RUNNER_TEMP}/kubeconfig" >> "${GITHUB_ENV}"

      - name: Write staging env file
        env:
          STAGING_ENV_FILE_CONTENT: ${{ secrets.STAGING_ENV_FILE }}
        run: |
          if [ -z "${STAGING_ENV_FILE_CONTENT:-}" ]; then
            echo "::error::Missing STAGING_ENV_FILE secret."
            exit 1
          fi
          printf '%s' "${STAGING_ENV_FILE_CONTENT}" > .env.staging

      - name: Deploy staging release
        run: |
          STAGING_IMAGE_REGISTRY=ghcr.io \
          STAGING_IMAGE_OWNER=${{ needs.prepare.outputs.image_owner }} \
          STAGING_IMAGE_TAG=${{ needs.prepare.outputs.image_tag }} \
          make k8s-up-staging

      - name: Capture staging cluster snapshot
        if: always()
        run: |
          mkdir -p artifacts/release
          kubectl get deploy,po,svc -n awe-staging -o wide > artifacts/release/staging-cluster-snapshot.txt

      - name: Upload staging cluster snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-cluster-snapshot-${{ needs.prepare.outputs.image_tag }}
          path: artifacts/release/staging-cluster-snapshot.txt

  agent-registry-e2e:
    needs: [prepare, deploy-staging]
    if: needs.prepare.result == 'success' && needs.deploy-staging.result == 'success'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve Agent Registry e2e target
        env:
          SECRET_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
          SECRET_BEARER_TOKEN: ${{ secrets.STAGING_API_BEARER_TOKEN }}
        run: |
          if [ -z "${SECRET_BASE_URL:-}" ]; then
            echo "::error::Missing STAGING_API_BASE_URL secret."
            exit 1
          fi
          echo "AGENT_REGISTRY_E2E_BASE_URL=${SECRET_BASE_URL}" >> "${GITHUB_ENV}"
          echo "AGENT_REGISTRY_E2E_OUTPUT=artifacts/evals/agent_registry_staging_e2e_report.json" >> "${GITHUB_ENV}"
          if [ -n "${SECRET_BEARER_TOKEN:-}" ]; then
            echo "AGENT_REGISTRY_E2E_BEARER_TOKEN=${SECRET_BEARER_TOKEN}" >> "${GITHUB_ENV}"
          fi

      - name: Verify Agent Registry profile flow
        run: make verify-agent-registry-staging

      - name: Upload Agent Registry e2e report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-registry-staging-e2e-${{ needs.prepare.outputs.image_tag }}
          if-no-files-found: ignore
          path: artifacts/evals/agent_registry_staging_e2e_report.json

  staging-regression:
    needs: [prepare, deploy-staging, agent-registry-e2e]
    uses: ./.github/workflows/staging-routing-gate.yml
    with:
      gold_path: ${{ needs.prepare.outputs.gold_path }}
      min_pass_rate: ${{ needs.prepare.outputs.min_pass_rate }}
      build_calibrator: ${{ needs.prepare.outputs.build_calibrator == 'true' }}
      verbose: ${{ needs.prepare.outputs.verbose == 'true' }}
    secrets: inherit
